<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Your Page</title>
    <script src="https://sp.vio.zzet.org/sdk/sentinel-sdk.js"></script>
</head>

<body>
    <h1>Your normal page content</h1>

    <script>
        (async () => {
            const SDK = window.SentinelSDK;
            const sessionId = sessionStorage.getItem('s') || ('s_' + crypto.randomUUID());
            sessionStorage.setItem('s', sessionId);
            await SDK.fingerprint.init(sessionId, { endpoint: 'https://sp.vio.zzet.org/api/v1/detection/fingerprint', tenant: 'test', });
            await SDK.persistent.persistentID(sessionId, 'https://sp.vio.zzet.org/api/v1/detection/persistent-id',);
        })();
    </script>
</body>

</html>
