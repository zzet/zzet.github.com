<svg viewBox="0 0 920 460" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The measurement loop</title>
  <desc>An append-only query log feeds zero-result mining and implicit-feedback learning, which adjust ranking. A separate offline harness, gortex eval pack, scores retrieval with Precision@K, Recall@K, MRR and a format-comprehension score, with an ablate mode to attribute each signal.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="459" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">The measurement loop</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Ranking is no longer tuned by feel — it is logged, mined, scored, and re-tuned.</text>

  <!-- online loop -->
  <text x="56" y="108" font-size="12" font-weight="600" fill="#64748B">ONLINE — learned from real queries</text>

  <g filter="url(#soft)">
    <rect x="56" y="124" width="170" height="64" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="141" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Query log</text>
    <text x="141" y="170" text-anchor="middle" font-size="11" fill="#64748B">append-only</text>
  </g>
  <g filter="url(#soft)">
    <rect x="290" y="124" width="170" height="64" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="375" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Zero-result mining</text>
    <text x="375" y="170" text-anchor="middle" font-size="11" fill="#64748B">find the misses</text>
  </g>
  <g filter="url(#soft)">
    <rect x="524" y="124" width="190" height="64" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="619" y="146" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Implicit feedback v2</text>
    <text x="619" y="165" text-anchor="middle" font-size="11" fill="#64748B">cluster scoping · force-inject</text>
    <text x="619" y="181" text-anchor="middle" font-size="11" fill="#64748B">negative signals</text>
  </g>
  <g filter="url(#soft)">
    <rect x="778" y="124" width="110" height="64" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="833" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Better</text>
    <text x="833" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">ranking</text>
  </g>

  <path d="M226,156 L290,156" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M460,156 L524,156" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M714,156 L778,156" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>

  <!-- feedback arc back to query log -->
  <path d="M833,188 C833,250 141,250 141,188" stroke="#0D9488" stroke-width="2" fill="none" stroke-dasharray="4 6" marker-end="url(#arrow)"/>
  <text x="487" y="246" text-anchor="middle" font-size="11" fill="#0D9488">ranking shapes which queries succeed next</text>

  <!-- divider -->
  <line x1="56" y1="288" x2="888" y2="288" stroke="#E2E8F0" stroke-width="1"/>

  <!-- offline harness -->
  <text x="56" y="318" font-size="12" font-weight="600" fill="#64748B">OFFLINE — scored on a fixture set</text>

  <g filter="url(#soft)">
    <rect x="56" y="334" width="230" height="86" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="171" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5" font-family="ui-monospace, Menlo, monospace">gortex eval pack</text>
    <text x="171" y="384" text-anchor="middle" font-size="11" fill="#64748B">pluggable pack strategies</text>
    <text x="171" y="402" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">--ablate · --strategies</text>
  </g>

  <!-- metric chips -->
  <g filter="url(#soft)">
    <rect x="332" y="334" width="120" height="40" rx="9" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="392" y="359" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">P@K</text>
  </g>
  <g filter="url(#soft)">
    <rect x="466" y="334" width="120" height="40" rx="9" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="526" y="359" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">R@K</text>
  </g>
  <g filter="url(#soft)">
    <rect x="600" y="334" width="120" height="40" rx="9" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="660" y="359" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">MRR</text>
  </g>
  <g filter="url(#soft)">
    <rect x="332" y="382" width="388" height="38" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="526" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">LLM format-comprehension score</text>
  </g>

  <path d="M286,377 L332,360" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- the ablate arrow back into ranking signals -->
  <g filter="url(#soft)">
    <rect x="766" y="334" width="122" height="86" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="827" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">attribute each</text>
    <text x="827" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">signal's lift</text>
    <text x="827" y="402" text-anchor="middle" font-size="11" fill="#64748B">tune weights</text>
  </g>
  <path d="M720,394 L766,388" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
