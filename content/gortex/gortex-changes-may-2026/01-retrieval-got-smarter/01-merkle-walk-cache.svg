<svg viewBox="0 0 820 520" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Merkle-keyed incremental walk cache</title>
  <desc>A package tree where each package carries a content hash. When one package changes its hash, only walks that touch that subtree are recomputed; every other package's cached random walk is reused.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="819" height="519" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Merkle-keyed walk cache</text>
  <text x="32" y="66" font-size="12" fill="#64748B">The random walk is keyed by a per-package content hash — only changed subtrees recompute.</text>

  <!-- repo root -->
  <g filter="url(#soft)">
    <rect x="330" y="96" width="160" height="56" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="410" y="121" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">repository</text>
    <text x="410" y="139" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">root hash</text>
  </g>

  <!-- edges root -> packages -->
  <line x1="370" y1="152" x2="160" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="410" y1="152" x2="410" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="152" x2="660" y2="232" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- package A (cached) -->
  <g filter="url(#soft)">
    <rect x="72" y="232" width="176" height="72" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="160" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">pkg/auth</text>
    <text x="160" y="278" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">hash a3f1…</text>
    <text x="160" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">cache hit — reused</text>
  </g>

  <!-- package B (changed) -->
  <g filter="url(#soft)">
    <rect x="322" y="232" width="176" height="72" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
    <text x="410" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">pkg/index</text>
    <text x="410" y="278" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">hash 9c20… (was 7b8e…)</text>
    <text x="410" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#E11D48">changed — recompute</text>
  </g>

  <!-- package C (cached) -->
  <g filter="url(#soft)">
    <rect x="572" y="232" width="176" height="72" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="660" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">pkg/search</text>
    <text x="660" y="278" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">hash 5d44…</text>
    <text x="660" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">cache hit — reused</text>
  </g>

  <!-- walk cache band -->
  <rect x="60" y="356" width="700" height="108" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="80" y="382" font-size="13" font-weight="600" fill="#1E293B">Walk cache</text>
  <text x="80" y="400" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">key = fnv(seeds, restart, pkg-hashes touched by the walk)</text>

  <!-- cached entries -->
  <g filter="url(#soft)">
    <rect x="84" y="412" width="180" height="40" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="174" y="437" text-anchor="middle" font-size="12" fill="#1E293B">walk(auth) → served</text>
  </g>
  <g filter="url(#soft)">
    <rect x="316" y="412" width="180" height="40" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
    <text x="406" y="437" text-anchor="middle" font-size="12" fill="#1E293B">walk(index) → evicted</text>
  </g>
  <g filter="url(#soft)">
    <rect x="548" y="412" width="180" height="40" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="638" y="437" text-anchor="middle" font-size="12" fill="#1E293B">walk(search) → served</text>
  </g>

  <!-- key-change connector from changed pkg to its evicted entry (animated) -->
  <path d="M410,304 L410,412" stroke="#E11D48" stroke-width="2.5" fill="none" stroke-dasharray="5 7" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1s" repeatCount="indefinite"/>
  </path>
  <line x1="160" y1="304" x2="174" y2="412" stroke="#059669" stroke-width="1.5"/>
  <line x1="660" y1="304" x2="638" y2="412" stroke="#059669" stroke-width="1.5"/>

  <!-- breathe highlight on changed pkg -->
  <rect x="322" y="232" width="176" height="72" rx="12" fill="none" stroke="#E11D48" stroke-width="2">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- legend -->
  <rect x="32" y="486" width="12" height="12" rx="3" fill="#059669"/>
  <text x="50" y="496" font-size="11" fill="#64748B">unchanged hash — cache hit</text>
  <rect x="270" y="486" width="12" height="12" rx="3" fill="#E11D48"/>
  <text x="288" y="496" font-size="11" fill="#64748B">changed hash — recompute</text>
</svg>
