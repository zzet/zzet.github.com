<svg viewBox="0 0 920 470" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The retrieval pipeline, end to end</title>
  <desc>A query flows left to right through query understanding, a parallel BM25 and semantic stage blended by a per-query alpha, a graph-centrality rerank using random-walk-with-restart, an exact-cosine refinement pass, and out to ranked results. A token animates along the path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="469" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">The retrieval pipeline, end to end</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Every search_symbols query — direct or assisted — travels these five stages.</text>

  <!-- query origin -->
  <g filter="url(#soft)">
    <rect x="32" y="190" width="118" height="64" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="91" y="218" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Query</text>
    <text x="91" y="237" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">"how does X work"</text>
  </g>

  <!-- stage 1: query understanding -->
  <g filter="url(#soft)">
    <rect x="186" y="170" width="160" height="104" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="266" y="194" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Query understanding</text>
    <text x="266" y="218" text-anchor="middle" font-size="11" fill="#64748B">thesaurus expansion</text>
    <text x="266" y="236" text-anchor="middle" font-size="11" fill="#64748B">keyword-soup split</text>
    <text x="266" y="254" text-anchor="middle" font-size="11" fill="#64748B">leaf-term rescue</text>
  </g>

  <!-- stage 2: parallel BM25 + semantic with alpha blend -->
  <g filter="url(#soft)">
    <rect x="382" y="138" width="160" height="52" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="462" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">BM25 (lexical)</text>
    <text x="462" y="180" text-anchor="middle" font-size="11" fill="#64748B">camelCase-aware</text>

    <rect x="382" y="254" width="160" height="52" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="462" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Semantic (vector)</text>
    <text x="462" y="296" text-anchor="middle" font-size="11" fill="#64748B">embeddings</text>
  </g>
  <!-- alpha blend node -->
  <g filter="url(#soft)">
    <rect x="478" y="200" width="78" height="44" rx="10" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="517" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">α blend</text>
    <text x="517" y="236" text-anchor="middle" font-size="10" fill="#64748B">per-query</text>
  </g>
  <line x1="462" y1="190" x2="500" y2="202" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="462" y1="254" x2="500" y2="242" stroke="#0D9488" stroke-width="1.5"/>

  <!-- stage 3: centrality rerank -->
  <g filter="url(#soft)">
    <rect x="588" y="170" width="148" height="104" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="662" y="194" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Graph rerank</text>
    <text x="662" y="216" text-anchor="middle" font-size="11" fill="#64748B">RWR / PPR centrality</text>
    <text x="662" y="234" text-anchor="middle" font-size="11" fill="#64748B">edge-provenance</text>
    <text x="662" y="252" text-anchor="middle" font-size="11" fill="#64748B">weighting</text>
  </g>

  <!-- stage 4: exact cosine refine + results -->
  <g filter="url(#soft)">
    <rect x="772" y="138" width="116" height="68" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="830" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Exact-cosine</text>
    <text x="830" y="184" text-anchor="middle" font-size="11" fill="#64748B">refinement</text>
    <text x="830" y="200" text-anchor="middle" font-size="11" fill="#64748B">pass</text>

    <rect x="772" y="238" width="116" height="68" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="830" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Ranked</text>
    <text x="830" y="289" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">results</text>
  </g>

  <!-- main animated flow path: query -> understanding -> blend -> rerank -> refine -> results -->
  <path id="flowPath"
        d="M150,222 L186,222 M346,222 L382,222 L478,222 M556,222 L588,222 M736,222 L772,172 M830,206 L830,238"
        stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <circle r="5.5" fill="#D97706">
    <animateMotion dur="3.4s" repeatCount="indefinite" rotate="auto"><mpath href="#flowPath"/></animateMotion>
  </circle>

  <!-- legend -->
  <rect x="32" y="430" width="12" height="12" rx="3" fill="#D97706"/>
  <text x="50" y="440" font-size="11" fill="#64748B">understand</text>
  <rect x="138" y="430" width="12" height="12" rx="3" fill="#4F46E5"/>
  <text x="156" y="440" font-size="11" fill="#64748B">lexical</text>
  <rect x="222" y="430" width="12" height="12" rx="3" fill="#0D9488"/>
  <text x="240" y="440" font-size="11" fill="#64748B">semantic / graph</text>
  <rect x="362" y="430" width="12" height="12" rx="3" fill="#059669"/>
  <text x="380" y="440" font-size="11" fill="#64748B">result</text>
</svg>
