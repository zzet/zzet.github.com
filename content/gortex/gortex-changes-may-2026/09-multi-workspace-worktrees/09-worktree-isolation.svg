<svg viewBox="0 0 920 470" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Worktree graph isolation: before vs after</title>
  <desc>Before, three git worktrees of one repository collapse into a single shared graph whose symbols collide. After, each worktree separates into its own independent graph instance with correctly scoped imports.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E11D48"/>
    </marker>
    <marker id="arrowEm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="469" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">One repo, three worktrees</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Before: graphs collide into one. After: each worktree is its own instance.</text>

  <!-- divider -->
  <line x1="460" y1="92" x2="460" y2="438" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- ===================== BEFORE ===================== -->
  <text x="60" y="108" font-size="13" font-weight="600" fill="#E11D48">BEFORE — shared, colliding</text>

  <!-- worktrees -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <rect x="44" y="126" width="150" height="40" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
    <text x="119" y="151" text-anchor="middle" font-size="12" fill="#1E293B">repo  (main)</text>
    <rect x="44" y="178" width="150" height="40" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
    <text x="119" y="203" text-anchor="middle" font-size="12" fill="#1E293B">repo  (feat-a)</text>
    <rect x="44" y="230" width="150" height="40" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
    <text x="119" y="255" text-anchor="middle" font-size="12" fill="#1E293B">repo  (feat-b)</text>
  </g>

  <!-- collapse arrows -->
  <line x1="196" y1="146" x2="300" y2="190" stroke="#E11D48" stroke-width="2" marker-end="url(#arrowRose)"/>
  <line x1="196" y1="198" x2="300" y2="198" stroke="#E11D48" stroke-width="2" marker-end="url(#arrowRose)"/>
  <line x1="196" y1="250" x2="300" y2="206" stroke="#E11D48" stroke-width="2" marker-end="url(#arrowRose)"/>

  <!-- one shared graph -->
  <g filter="url(#soft)">
    <rect x="305" y="150" width="120" height="96" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  </g>
  <text x="365" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">one graph</text>
  <text x="365" y="192" text-anchor="middle" font-size="10.5" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">repo/orm.go::orm</text>
  <text x="365" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#E11D48">collisions</text>
  <text x="365" y="237" text-anchor="middle" font-size="10" fill="#64748B">usages bleed across</text>

  <!-- ===================== AFTER ===================== -->
  <text x="500" y="108" font-size="13" font-weight="600" fill="#059669">AFTER — isolated instances</text>

  <!-- worktrees -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <rect x="484" y="126" width="150" height="40" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
    <text x="559" y="151" text-anchor="middle" font-size="12" fill="#1E293B">repo  (main)</text>
    <rect x="484" y="178" width="150" height="40" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
    <text x="559" y="203" text-anchor="middle" font-size="12" fill="#1E293B">repo  (feat-a)</text>
    <rect x="484" y="230" width="150" height="40" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
    <text x="559" y="255" text-anchor="middle" font-size="12" fill="#1E293B">repo  (feat-b)</text>
  </g>

  <!-- separating arrows: these animate (breathe) to show isolation -->
  <line x1="636" y1="146" x2="724" y2="146" stroke="#059669" stroke-width="2" marker-end="url(#arrowEm)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0s" repeatCount="indefinite"/>
  </line>
  <line x1="636" y1="198" x2="724" y2="198" stroke="#059669" stroke-width="2" marker-end="url(#arrowEm)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="636" y1="250" x2="724" y2="250" stroke="#059669" stroke-width="2" marker-end="url(#arrowEm)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="1s" repeatCount="indefinite"/>
  </line>

  <!-- three distinct graphs -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <rect x="730" y="126" width="160" height="40" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
    <text x="810" y="151" text-anchor="middle" font-size="11.5" fill="#1E293B">repo</text>
    <rect x="730" y="178" width="160" height="40" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
    <text x="810" y="203" text-anchor="middle" font-size="11.5" fill="#1E293B">repo@feat-a</text>
    <rect x="730" y="230" width="160" height="40" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
    <text x="810" y="255" text-anchor="middle" font-size="11.5" fill="#1E293B">repo@feat-b</text>
  </g>

  <!-- bottom note band -->
  <rect x="44" y="318" width="832" height="124" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="64" y="346" font-size="13" font-weight="600" fill="#1E293B">The instance prefix is the fix</text>
  <text x="64" y="370" font-size="11.5" fill="#64748B">A linked worktree that declares a distinct workspace registers under a derived prefix</text>
  <text x="64" y="388" font-size="11.5" fill="#64748B">instead of coalescing into the canonical checkout. Every node ID is namespaced by it:</text>

  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <rect x="64" y="402" width="360" height="28" rx="7" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
    <text x="78" y="421" font-size="12" fill="#1E293B">repo/feature.go::Feature</text>
    <text x="392" y="421" text-anchor="middle" font-size="11" fill="#E11D48">×</text>

    <rect x="492" y="402" width="384" height="28" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.2"/>
    <text x="506" y="421" font-size="12" fill="#1E293B">repo@feat-a/feature.go::Feature</text>
    <text x="852" y="421" text-anchor="middle" font-size="11" fill="#059669">✓</text>
  </g>
</svg>
