<svg viewBox="0 0 920 520" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Gortex storage architecture</title>
  <desc>The graph backend (memory or pure-Go SQLite) sits alongside a SQLite sidecar for agent knowledge and typed sidecars for churn and releases, all living under a unified ~/.gortex home directory.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="519" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Storage layout: one home, three kinds of store</text>
  <text x="32" y="66" font-size="12" fill="#64748B">The graph backend is selectable; agent knowledge and pre-computed enrichment live in typed sidecars.</text>

  <!-- daemon node -->
  <g filter="url(#soft)">
    <rect x="60" y="96" width="170" height="58" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="145" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Gortex daemon</text>
    <text x="145" y="141" text-anchor="middle" font-size="11" fill="#64748B">CLI + MCP server</text>
  </g>

  <!-- the ~/.gortex home enclosure -->
  <rect x="60" y="190" width="800" height="300" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="80" y="216" font-size="13" font-weight="600" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">~/.gortex/</text>
  <text x="190" y="216" font-size="11" fill="#64748B">unified per-user home — auto-migrated on first run; XDG overrides still win</text>

  <!-- graph backend column -->
  <g filter="url(#soft)">
    <rect x="88" y="236" width="222" height="124" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="199" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Graph backend</text>
    <text x="199" y="281" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">--backend memory | sqlite</text>
    <line x1="108" y1="296" x2="290" y2="296" stroke="#CCFBF1" stroke-width="1"/>
    <text x="199" y="318" text-anchor="middle" font-size="12" fill="#1E293B">nodes &amp; edges</text>
    <text x="199" y="338" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">store/  ·  FTS5 symbol search</text>
  </g>
  <text x="199" y="382" text-anchor="middle" font-size="11" fill="#0D9488" font-weight="600">pure-Go (modernc.org/sqlite) — no CGO for the store</text>

  <!-- sidecar: agent knowledge -->
  <g filter="url(#soft)">
    <rect x="334" y="236" width="232" height="124" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="450" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">SQLite sidecar</text>
    <text x="450" y="281" text-anchor="middle" font-size="11" fill="#64748B">agent-authored knowledge</text>
    <line x1="354" y1="296" x2="546" y2="296" stroke="#FEF3C7" stroke-width="1"/>
    <text x="450" y="316" text-anchor="middle" font-size="11.5" fill="#1E293B">session notes · dev memories</text>
    <text x="450" y="336" text-anchor="middle" font-size="11.5" fill="#1E293B">saved scopes · notebooks</text>
  </g>
  <text x="450" y="382" text-anchor="middle" font-size="11" fill="#D97706" font-weight="600">survives restarts · migrates from the old flat-file layout</text>

  <!-- typed sidecars: churn + releases -->
  <g filter="url(#soft)">
    <rect x="590" y="236" width="232" height="124" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="706" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Typed sidecars</text>
    <text x="706" y="281" text-anchor="middle" font-size="11" fill="#64748B">pre-computed enrichment</text>
    <line x1="610" y1="296" x2="802" y2="296" stroke="#E2E8F0" stroke-width="1"/>
    <text x="706" y="316" text-anchor="middle" font-size="11.5" fill="#1E293B">releases "added_in" timeline</text>
    <text x="706" y="336" text-anchor="middle" font-size="11.5" fill="#1E293B">churn rates</text>
  </g>
  <text x="706" y="382" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">reads don't re-walk git / tags</text>

  <!-- other home entries -->
  <rect x="88" y="406" width="734" height="66" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="105" y="430" font-size="12" font-weight="600" fill="#475569">also under the home tree</text>
  <text x="105" y="456" font-size="12" fill="#1E293B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">config.yaml   ·   cache/   ·   models/   ·   memories/</text>

  <!-- daemon to home arrows -->
  <line x1="145" y1="154" x2="145" y2="234" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="125" x2="430" y2="234" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 5" marker-end="url(#arrow)"/>
  <line x1="230" y1="125" x2="690" y2="234" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 5" marker-end="url(#arrow)"/>
</svg>
