<svg viewBox="0 0 920 520" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Many file types flowing into one unified knowledge graph</title>
  <desc>Infrastructure-as-code, legacy systems, documentation, binary assets, live database schemas, and application code are each routed through the indexer and land as nodes and edges in a single queryable knowledge graph.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="519" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">One graph, many file types</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Infra, legacy, docs, and binary assets land in the same graph as your application code.</text>

  <!-- ===== left column: input file types ===== -->
  <text x="40" y="104" font-size="12" font-weight="700" fill="#64748B">INPUTS</text>

  <!-- chips: x=40 width=210, two columns inside is overkill; single column of compact rows -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11">
    <rect x="40" y="116" width="220" height="26" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.5"/>
    <text x="52" y="133" fill="#1E293B">Terraform / HCL</text>
    <rect x="40" y="148" width="220" height="26" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.5"/>
    <text x="52" y="165" fill="#1E293B">Helm charts &amp; templates</text>
    <rect x="40" y="180" width="220" height="26" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.5"/>
    <text x="52" y="197" fill="#1E293B">Ansible playbooks / roles</text>
    <rect x="40" y="212" width="220" height="26" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-opacity="0.5"/>
    <text x="52" y="229" fill="#1E293B">.sln / .csproj / .fsproj</text>
    <rect x="40" y="244" width="220" height="26" rx="7" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.5"/>
    <text x="52" y="261" fill="#1E293B">COBOL paragraphs + JCL</text>
    <rect x="40" y="276" width="220" height="26" rx="7" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.5"/>
    <text x="52" y="293" fill="#1E293B">Luau typed functions</text>
    <rect x="40" y="308" width="220" height="26" rx="7" fill="#F0FDFA" stroke="#0D9488" stroke-opacity="0.5"/>
    <text x="52" y="325" fill="#1E293B">Quarto .qmd</text>
    <rect x="40" y="340" width="220" height="26" rx="7" fill="#FFFBEB" stroke="#D97706" stroke-opacity="0.6"/>
    <text x="52" y="357" fill="#1E293B">C / C++ #define macros</text>
    <rect x="40" y="372" width="220" height="26" rx="7" fill="#FFFBEB" stroke="#D97706" stroke-opacity="0.6"/>
    <text x="52" y="389" fill="#1E293B">MCP server configs</text>
    <rect x="40" y="404" width="220" height="26" rx="7" fill="#F1F5F9" stroke="#475569" stroke-opacity="0.5"/>
    <text x="52" y="421" fill="#1E293B">images · PDFs · live DB schema</text>
    <rect x="40" y="436" width="220" height="26" rx="7" fill="#F1F5F9" stroke="#475569" stroke-opacity="0.5"/>
    <text x="52" y="453" fill="#1E293B">application code (many langs)</text>
  </g>

  <!-- ===== middle: indexer ===== -->
  <g filter="url(#soft)">
    <rect x="372" y="232" width="150" height="116" rx="14" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="447" y="280" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">indexer</text>
    <text x="447" y="302" text-anchor="middle" font-size="11" fill="#64748B">extractor per</text>
    <text x="447" y="316" text-anchor="middle" font-size="11" fill="#64748B">file type</text>
    <text x="447" y="335" text-anchor="middle" font-size="10" fill="#4F46E5" font-family="ui-monospace, Menlo, monospace">parse → nodes + edges</text>
  </g>

  <!-- animated streaming connectors from inputs into indexer -->
  <g fill="none" stroke="#4F46E5" stroke-width="2" stroke-dasharray="5 7" opacity="0.8">
    <path d="M260,129 C320,129 330,270 372,272">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M260,193 C322,193 332,278 372,282">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.0s" repeatCount="indefinite"/>
    </path>
    <path d="M260,261 C330,261 340,290 372,290">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M260,325 C330,325 340,300 372,298">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M260,389 C322,389 332,310 372,306">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M260,453 C320,453 330,320 372,312">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- one animated edge into graph with a traveling token -->
  <path id="toGraph" d="M522,290 C580,290 600,290 642,290" stroke="#4F46E5" stroke-width="2.5"
        fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.0s" repeatCount="indefinite"/>
  </path>
  <circle r="5" fill="#D97706">
    <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#toGraph"/></animateMotion>
  </circle>

  <!-- ===== right: unified knowledge graph ===== -->
  <g filter="url(#soft)">
    <rect x="642" y="180" width="246" height="220" rx="14" fill="#F8FAFC" stroke="#0D9488" stroke-width="1.5"/>
    <text x="765" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#0D9488">unified knowledge graph</text>
    <text x="765" y="224" text-anchor="middle" font-size="11" fill="#64748B">~31k nodes · ~206k edges</text>

    <!-- mini graph nodes -->
    <line x1="700" y1="278" x2="770" y2="252" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="770" y1="252" x2="838" y2="288" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="700" y1="278" x2="760" y2="340" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="760" y1="340" x2="838" y2="288" stroke="#94A3B8" stroke-width="1.4"/>
    <line x1="770" y1="252" x2="760" y2="340" stroke="#94A3B8" stroke-width="1.4"/>
    <circle cx="770" cy="252" r="11" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <circle cx="700" cy="278" r="11" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <circle cx="838" cy="288" r="11" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <circle cx="760" cy="340" r="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.5">
      <animate attributeName="r" values="11;13;11" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="765" y="378" text-anchor="middle" font-size="11" fill="#64748B">one query surface for all of it</text>
  </g>

  <!-- legend -->
  <rect x="372" y="436" width="12" height="12" rx="3" fill="#4F46E5"/>
  <text x="390" y="446" font-size="11" fill="#64748B">infra-as-code</text>
  <rect x="372" y="456" width="12" height="12" rx="3" fill="#0D9488"/>
  <text x="390" y="466" font-size="11" fill="#64748B">legacy &amp; docs</text>
  <rect x="510" y="436" width="12" height="12" rx="3" fill="#D97706"/>
  <text x="528" y="446" font-size="11" fill="#64748B">macros · MCP cfg</text>
  <rect x="510" y="456" width="12" height="12" rx="3" fill="#475569"/>
  <text x="528" y="466" font-size="11" fill="#64748B">assets · code</text>
</svg>
