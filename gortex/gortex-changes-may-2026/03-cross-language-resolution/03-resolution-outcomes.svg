<svg viewBox="0 0 820 520" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The resolution-outcomes taxonomy</title>
  <desc>Instead of leaving a silent gap, every unresolved edge is classified by why it could not be resolved — for example an external package, a dynamic dispatch the synthesizers did not reach, or a genuinely missing target.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="819" height="519" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Why an edge stayed unresolved</text>
  <text x="32" y="66" font-size="12" fill="#64748B">analyze kind=resolution_outcomes turns a silent gap into a categorized account.</text>

  <!-- root -->
  <g filter="url(#soft)">
    <rect x="300" y="100" width="220" height="64" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="410" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">unresolved edge</text>
    <text x="410" y="148" text-anchor="middle" font-size="11" fill="#64748B">a call/usage with no real target</text>
  </g>

  <!-- branches -->
  <path d="M360,164 L180,224" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M410,164 L410,224" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M460,164 L640,224" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- category: external -->
  <g filter="url(#soft)">
    <rect x="64" y="228" width="232" height="84" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="180" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">external package</text>
    <text x="180" y="278" text-anchor="middle" font-size="11" fill="#64748B">third-party call, now</text>
    <text x="180" y="294" text-anchor="middle" font-size="11" fill="#64748B">qualified — not dropped</text>
  </g>

  <!-- category: dynamic -->
  <g filter="url(#soft)">
    <rect x="294" y="228" width="232" height="84" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="410" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">dynamic dispatch</text>
    <text x="410" y="278" text-anchor="middle" font-size="11" fill="#64748B">runtime wiring no</text>
    <text x="410" y="294" text-anchor="middle" font-size="11" fill="#64748B">synthesizer reached yet</text>
  </g>

  <!-- category: missing -->
  <g filter="url(#soft)">
    <rect x="524" y="228" width="232" height="84" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
    <text x="640" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">genuinely missing</text>
    <text x="640" y="278" text-anchor="middle" font-size="11" fill="#64748B">target absent from</text>
    <text x="640" y="294" text-anchor="middle" font-size="11" fill="#64748B">the indexed corpus</text>
  </g>

  <!-- second level under dynamic -->
  <path d="M340,312 L260,372" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M410,312 L410,372" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M480,312 L560,372" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="150" y="376" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="245" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">DI interface binding</text>
    <text x="245" y="420" text-anchor="middle" font-size="11" fill="#64748B">Spring · Symfony</text>
  </g>
  <g filter="url(#soft)">
    <rect x="346" y="376" width="128" height="60" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="410" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">native bridge</text>
    <text x="410" y="420" text-anchor="middle" font-size="11" fill="#64748B">RN · Swift/ObjC</text>
  </g>
  <g filter="url(#soft)">
    <rect x="480" y="376" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="575" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">data-access mapper</text>
    <text x="575" y="420" text-anchor="middle" font-size="11" fill="#64748B">MyBatis · SQL call site</text>
  </g>

  <!-- breathing highlight on root to draw the eye -->
  <rect x="300" y="100" width="220" height="64" rx="12" fill="none" stroke="#4F46E5" stroke-width="2">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- footer note -->
  <text x="410" y="476" text-anchor="middle" font-size="11.5" fill="#64748B">Each leaf is a category a downstream pass can act on — recover it, qualify it, or report it honestly.</text>
</svg>
