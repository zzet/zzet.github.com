<svg viewBox="0 0 920 480" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The framework dynamic-dispatch synthesizer engine</title>
  <desc>Four separate language islands — JavaScript, native Swift and Kotlin, SQL, and a dependency-injection container — joined by synthesized bridge edges that a central synthesizer engine lands on real targets.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0D9488"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="479" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">The synthesizer engine joins the islands</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Each pass recovers edges a framework creates at runtime, then lands them on a real target node.</text>

  <!-- central engine -->
  <g filter="url(#soft)">
    <rect x="350" y="200" width="220" height="80" rx="14" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="460" y="234" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">Synthesizer engine</text>
    <text x="460" y="254" text-anchor="middle" font-size="11" fill="#64748B">ordered passes · provenance-tagged</text>
    <text x="460" y="270" text-anchor="middle" font-size="11" fill="#4F46E5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">react-native · mybatis · …</text>
  </g>

  <!-- islands -->
  <g filter="url(#soft)">
    <rect x="48" y="96" width="190" height="68" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="143" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">JavaScript / TS</text>
    <text x="143" y="146" text-anchor="middle" font-size="11" fill="#64748B">React Native · Expo · Fabric</text>

    <rect x="48" y="316" width="190" height="68" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="143" y="346" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Native Swift / Kotlin</text>
    <text x="143" y="366" text-anchor="middle" font-size="11" fill="#64748B">Objective-C · companion-object</text>

    <rect x="682" y="96" width="190" height="68" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="777" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">SQL</text>
    <text x="777" y="146" text-anchor="middle" font-size="11" fill="#64748B">MyBatis mapper XML · call sites</text>

    <rect x="682" y="316" width="190" height="68" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="777" y="346" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">DI container</text>
    <text x="777" y="366" text-anchor="middle" font-size="11" fill="#64748B">Spring · Symfony bindings</text>
  </g>

  <!-- synthesized bridge edges (dashed, flowing) -->
  <path d="M238,130 C300,150 320,190 350,220" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M238,350 C300,330 320,290 350,260" stroke="#0D9488" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrowTeal)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M682,130 C620,150 600,190 570,220" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M682,350 C620,330 600,290 570,260" stroke="#0D9488" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrowTeal)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- downstream consumers -->
  <g filter="url(#soft)">
    <rect x="300" y="404" width="320" height="52" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="460" y="426" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">feeds find_usages · get_callers · contracts · analyze</text>
    <text x="460" y="444" text-anchor="middle" font-size="11" fill="#64748B">fewer false "unused" results · real cross-stack call chains</text>
  </g>
  <path d="M460,280 L460,404" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- legend -->
  <rect x="32" y="436" width="12" height="12" rx="3" fill="#4F46E5"/>
  <text x="50" y="446" font-size="11" fill="#64748B">synthesized bridge edge</text>
</svg>
