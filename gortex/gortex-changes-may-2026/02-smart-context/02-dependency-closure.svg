<svg viewBox="0 0 920 480" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Dependency-closure selection, clustered by file</title>
  <desc>A seed symbol radiates along call, reference, and import edges to exactly the symbols a change depends on; the reached symbols are grouped by file and ranked by graph distance to the seed.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0D9488"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="479" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Dependency-closure selection</text>
  <text x="32" y="66" font-size="12" fill="#64748B">From a seed, follow real dependency edges — calls, references, imports — not lexical neighbors. Cluster the result by file.</text>

  <!-- seed -->
  <g filter="url(#soft)">
    <rect x="40" y="206" width="170" height="64" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  </g>
  <text x="125" y="232" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">Resolve()</text>
  <text x="125" y="252" text-anchor="middle" font-size="11" fill="#64748B">seed · distance 0</text>

  <!-- edges from seed to depth-1 -->
  <path d="M210,224 C270,180 300,150 350,138" stroke="#4F46E5" stroke-width="2" fill="none" stroke-dasharray="5 6" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="22" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M210,238 C280,238 300,238 350,238" stroke="#4F46E5" stroke-width="2" fill="none" stroke-dasharray="5 6" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="22" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M210,252 C270,300 300,330 350,344" stroke="#4F46E5" stroke-width="2" fill="none" stroke-dasharray="5 6" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="22" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>

  <!-- file cluster A -->
  <rect x="350" y="104" width="216" height="100" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-dasharray="4 4"/>
  <text x="362" y="122" font-size="11" font-weight="600" font-family="ui-monospace, Menlo, monospace" fill="#64748B">resolver/edges.go</text>
  <g filter="url(#soft)">
    <rect x="362" y="130" width="190" height="28" rx="8" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.3"/>
    <rect x="362" y="166" width="190" height="28" rx="8" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.3"/>
  </g>
  <text x="372" y="148" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1E293B">Edge.Match()</text>
  <text x="540" y="148" text-anchor="end" font-size="10" fill="#64748B">d1</text>
  <text x="372" y="184" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1E293B">Path.split()</text>
  <text x="540" y="184" text-anchor="end" font-size="10" fill="#64748B">d1</text>

  <!-- file cluster B -->
  <rect x="350" y="214" width="216" height="62" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-dasharray="4 4"/>
  <text x="362" y="232" font-size="11" font-weight="600" font-family="ui-monospace, Menlo, monospace" fill="#64748B">graph/store.go</text>
  <g filter="url(#soft)">
    <rect x="362" y="240" width="190" height="28" rx="8" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.3"/>
  </g>
  <text x="372" y="258" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1E293B">Store.OutEdges()</text>
  <text x="540" y="258" text-anchor="end" font-size="10" fill="#64748B">d1</text>

  <!-- file cluster C (depth 2) -->
  <rect x="350" y="288" width="216" height="62" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-dasharray="4 4"/>
  <text x="362" y="306" font-size="11" font-weight="600" font-family="ui-monospace, Menlo, monospace" fill="#64748B">graph/node.go</text>
  <g filter="url(#soft)">
    <rect x="362" y="314" width="190" height="28" rx="8" fill="#EFF6FF" stroke="#64748B" stroke-width="1.1"/>
  </g>
  <text x="372" y="332" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#475569">Node.id()</text>
  <text x="540" y="332" text-anchor="end" font-size="10" fill="#64748B">d2</text>

  <!-- depth-2 edges -->
  <path d="M552,182 C600,210 600,250 552,254" stroke="#0D9488" stroke-width="1.6" fill="none" stroke-dasharray="4 5" marker-end="url(#arrowt)">
    <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1.3s" repeatCount="indefinite"/>
  </path>
  <path d="M552,254 C600,280 600,305 552,322" stroke="#0D9488" stroke-width="1.6" fill="none" stroke-dasharray="4 5" marker-end="url(#arrowt)">
    <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1.3s" repeatCount="indefinite"/>
  </path>

  <!-- ranking / packing column -->
  <line x1="600" y1="100" x2="600" y2="358" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="624" y="124" font-size="13" font-weight="600" fill="#1E293B">Pack under budget</text>
  <text x="624" y="143" font-size="11" fill="#64748B">nearest first, then demote</text>

  <g filter="url(#soft)">
    <rect x="624" y="158" width="264" height="34" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
  </g>
  <text x="638" y="179" font-size="12" fill="#1E293B"><tspan font-weight="600">d0–d1</tspan> nearest → <tspan font-family="ui-monospace, Menlo, monospace">full source</tspan></text>

  <g filter="url(#soft)">
    <rect x="624" y="200" width="264" height="34" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.3"/>
  </g>
  <text x="638" y="221" font-size="12" fill="#1E293B"><tspan font-weight="600">mid</tspan> → <tspan font-family="ui-monospace, Menlo, monospace">signatures only</tspan></text>

  <g filter="url(#soft)">
    <rect x="624" y="242" width="264" height="34" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.1"/>
  </g>
  <text x="638" y="263" font-size="12" fill="#1E293B"><tspan font-weight="600">far</tspan> → <tspan font-family="ui-monospace, Menlo, monospace">outline / omit</tspan></text>

  <text x="624" y="306" font-size="11.5" fill="#64748B" font-style="italic">Only what the change actually</text>
  <text x="624" y="322" font-size="11.5" fill="#64748B" font-style="italic">depends on enters the pack —</text>
  <text x="624" y="338" font-size="11.5" fill="#64748B" font-style="italic">ranked by proximity to the seed.</text>

  <!-- legend -->
  <rect x="32" y="446" width="12" height="12" rx="3" fill="#4F46E5"/>
  <text x="50" y="456" font-size="11" fill="#64748B">seed</text>
  <rect x="104" y="446" width="12" height="12" rx="3" fill="#0D9488"/>
  <text x="122" y="456" font-size="11" fill="#64748B">dependency edge (calls / references / imports)</text>
  <rect x="392" y="446" width="12" height="12" rx="3" fill="#E2E8F0" stroke="#94A3B8" stroke-dasharray="2 2"/>
  <text x="410" y="456" font-size="11" fill="#64748B">file cluster · dN = graph distance from seed</text>
</svg>
