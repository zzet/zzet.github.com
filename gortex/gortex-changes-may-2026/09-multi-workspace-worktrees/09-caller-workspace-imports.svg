<svg viewBox="0 0 820 470" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Imports bind to the caller's worktree workspace</title>
  <desc>An import from a feature-workspace caller resolves into the worktree instance of the same name, not the canonical checkout, so cross-worktree resolution does not leak.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0D9488"/>
    </marker>
    <marker id="arrowMute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="819" height="469" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Resolution stays inside the worktree</text>
  <text x="32" y="66" font-size="12" fill="#64748B">An import binds to the caller's workspace — even when a symbol name exists in both copies.</text>

  <!-- caller -->
  <g filter="url(#soft)">
    <rect x="40" y="110" width="240" height="92" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  </g>
  <text x="160" y="136" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1E293B">caller</text>
  <text x="160" y="160" text-anchor="middle" font-size="11.5" fill="#0D9488" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">workspace: task-ws</text>
  <text x="160" y="184" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">import "orm"</text>

  <!-- two candidate targets, same qual-name -->
  <g filter="url(#soft)">
    <rect x="540" y="92" width="240" height="78" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.8"/>
  </g>
  <text x="660" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">worktree instance</text>
  <text x="660" y="142" text-anchor="middle" font-size="11.5" fill="#0D9488" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">oas-orm@task</text>
  <text x="660" y="160" text-anchor="middle" font-size="10.5" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">orm.go::orm</text>

  <g>
    <rect x="540" y="206" width="240" height="78" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.3"/>
  </g>
  <text x="660" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#64748B">canonical checkout</text>
  <text x="660" y="256" text-anchor="middle" font-size="11.5" fill="#94A3B8" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">oas-orm</text>
  <text x="660" y="274" text-anchor="middle" font-size="10.5" fill="#94A3B8" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">orm.go::orm</text>

  <!-- bound edge (chosen) -->
  <path id="bound" d="M280,148 C400,138 430,130 540,130" stroke="#0D9488" stroke-width="2.6"
        fill="none" marker-end="url(#arrow)"/>
  <circle r="4.5" fill="#0D9488">
    <animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#bound"/></animateMotion>
  </circle>
  <text x="408" y="118" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0D9488">binds here</text>

  <!-- rejected edge (would leak) -->
  <path d="M280,170 C400,210 430,232 540,242" stroke="#94A3B8" stroke-width="1.8"
        fill="none" stroke-dasharray="5 6" marker-end="url(#arrowMute)"/>
  <text x="420" y="232" text-anchor="middle" font-size="11" fill="#94A3B8">would leak — rejected</text>

  <!-- note band -->
  <rect x="40" y="316" width="740" height="124" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="60" y="344" font-size="13" font-weight="600" fill="#1E293B">Why this matters for the resolver</text>
  <text x="60" y="368" font-size="11.5" fill="#64748B">The single-valued qualified-name index may surface either copy of</text>
  <text x="60" y="386" font-size="11.5" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">orm.go::orm</text>
  <text x="278" y="386" font-size="11.5" fill="#64748B" font-family="'Inter', system-ui, sans-serif">first. Cross-repo resolution disambiguates by the caller's workspace,</text>
  <text x="60" y="404" font-size="11.5" fill="#64748B">so a task-ws import always lands in the task-ws instance — never the canonical, never the</text>
  <text x="60" y="422" font-size="11.5" fill="#64748B">wrong feature branch. Usages, callers, and find-implementations stay scoped to one checkout.</text>
</svg>
