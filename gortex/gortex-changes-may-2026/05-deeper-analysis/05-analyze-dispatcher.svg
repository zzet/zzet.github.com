<svg viewBox="0 0 920 460" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The analyze tool is a 60-kind dispatcher</title>
  <desc>A single analyze tool fans out by a kind parameter into many analysis families, including the new bottlenecks kind and groups for structure, security, coverage, and capability-driven analysis.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="459" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">One tool, sixty kinds</text>
  <text x="32" y="66" font-size="12" fill="#64748B">analyze dispatches on kind &#8212; the new work lands as additional kinds, not new tools</text>

  <!-- dispatcher -->
  <g filter="url(#soft)">
    <rect x="40" y="170" width="190" height="110" rx="14" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="135" y="212" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">analyze</text>
    <text x="135" y="234" text-anchor="middle" font-size="12" fill="#64748B">kind: "&#8230;"</text>
    <text x="135" y="256" text-anchor="middle" font-size="11.5" font-weight="700" fill="#4F46E5">60-kind dispatcher</text>
  </g>

  <!-- group: bottlenecks (highlighted, new) -->
  <g filter="url(#soft)">
    <rect x="360" y="92" width="220" height="64" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
    <text x="376" y="118" font-size="13.5" font-weight="700" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">kind: bottlenecks</text>
    <text x="376" y="138" font-size="11" fill="#64748B">cognitive + transitive loop depth + recursion</text>
  </g>

  <!-- group: structure -->
  <g filter="url(#soft)">
    <rect x="360" y="172" width="220" height="68" rx="12" fill="#F8FAFC" stroke="#475569" stroke-width="1.3"/>
    <text x="376" y="196" font-size="13" font-weight="600" fill="#1E293B">structure</text>
    <text x="376" y="216" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">impact &#183; health_score </text>
    <text x="376" y="226" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">dead_code &#183; cycles</text>
  </g>

  <!-- group: security -->
  <g filter="url(#soft)">
    <rect x="360" y="256" width="220" height="68" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
    <text x="376" y="280" font-size="13" font-weight="600" fill="#1E293B">security</text>
    <text x="376" y="300" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">sast (190 rules) &#183; named &#183;</text>
    <text x="376" y="310" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">unsafe_patterns</text>
  </g>

  <!-- group: graph health -->
  <g filter="url(#soft)">
    <rect x="360" y="340" width="220" height="68" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.3"/>
    <text x="376" y="364" font-size="13" font-weight="600" fill="#1E293B">graph health</text>
    <text x="376" y="384" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">clusters &#183; connectivity_health &#183;</text>
    <text x="376" y="394" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">synthesizers</text>b
  </g>

  <!-- right column: more kinds, faded -->
  <g filter="url(#soft)">
    <rect x="660" y="172" width="220" height="132" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.3"/>
    <text x="676" y="196" font-size="12.5" font-weight="600" fill="#64748B">&#8230; and ~50 more</text>
    <text x="676" y="220" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">tests_as_edges</text>
    <text x="676" y="240" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">resolution_outcomes</text>
    <text x="676" y="260" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">coverage_gaps</text>
    <text x="676" y="280" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">stale_code &#183; ownership</text>
  </g>

  <!-- fan-out connectors -->
  <path d="M230,196 C300,150 320,124 360,124" stroke="#D97706" stroke-width="2.2" fill="none" stroke-dasharray="6 7" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="13" to="0" dur="1.0s" repeatCount="indefinite"/>
  </path>
  <path d="M230,210 C300,205 320,201 360,201" stroke="#64748B" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M230,230 C300,250 320,272 360,275" stroke="#64748B" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M230,250 C300,300 320,346 360,349" stroke="#64748B" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M580,238 C620,238 630,238 660,238" stroke="#64748B" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <text x="32" y="430" font-size="11" fill="#64748B">The bottlenecks kind (highlighted) is computed interprocedurally; most others read signals stamped at index time.</text>
</svg>
