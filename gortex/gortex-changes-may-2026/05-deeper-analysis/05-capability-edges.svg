<svg viewBox="0 0 920 470" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Capability edges: reads_env, executes_process, accesses_field</title>
  <desc>Three function nodes are linked by first-class capability edges to an environment secret, a shelled-out command, and a struct field. An animated audit query traverses the reads_env edge from a function to the AWS secret in a single hop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E11D48"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="469" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">Capability edges are real graph edges</text>
  <text x="32" y="66" font-size="12" fill="#64748B">Synthesized after resolution &#8212; a least-privilege audit traverses them in one hop</text>

  <!-- audit query box -->
  <g filter="url(#soft)">
    <rect x="32" y="92" width="300" height="46" rx="10" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
    <text x="48" y="113" font-size="12" font-weight="700" fill="#E11D48">audit query</text>
    <text x="48" y="130" font-size="12.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#1E293B">what reads $AWS_SECRET ?</text>
  </g>

  <!-- function column -->
  <g filter="url(#soft)">
    <rect x="120" y="178" width="220" height="58" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="230" y="203" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">loadCredentials()</text>
    <text x="230" y="222" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">internal/aws/creds.go</text>

    <rect x="120" y="266" width="220" height="58" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="230" y="291" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">runMigration()</text>
    <text x="230" y="310" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">internal/db/migrate.go</text>

    <rect x="120" y="354" width="220" height="58" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="230" y="379" text-anchor="middle" font-size="14" font-weight="600" fill="#1E293B">applyConfig()</text>
    <text x="230" y="398" text-anchor="middle" font-size="11" fill="#64748B" font-family="ui-monospace, Menlo, monospace">internal/cfg/apply.go</text>
  </g>

  <!-- target column -->
  <g filter="url(#soft)">
    <rect x="620" y="178" width="248" height="58" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="744" y="203" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">$AWS_SECRET</text>
    <text x="744" y="222" text-anchor="middle" font-size="11" fill="#64748B">environment key</text>

    <rect x="620" y="266" width="248" height="58" rx="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
    <text x="744" y="291" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">exec("psql")</text>
    <text x="744" y="310" text-anchor="middle" font-size="11" fill="#64748B">shelled-out process</text>

    <rect x="620" y="354" width="248" height="58" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="744" y="379" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">Config.Token</text>
    <text x="744" y="398" text-anchor="middle" font-size="11" fill="#64748B">struct field (write)</text>
  </g>

  <!-- reads_env edge (animated audit path) -->
  <path id="readsEnvPath" d="M340,207 L620,207" stroke="#E11D48" stroke-width="2.5" fill="none"
        stroke-dasharray="6 7" marker-end="url(#arrowRose)">
    <animate attributeName="stroke-dashoffset" from="13" to="0" dur="1.0s" repeatCount="indefinite"/>
  </path>
  <rect x="412" y="186" width="96" height="20" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="460" y="200" text-anchor="middle" font-size="11.5" font-weight="700" fill="#E11D48" font-family="ui-monospace, Menlo, monospace">reads_env</text>
  <circle r="5.5" fill="#E11D48">
    <animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#readsEnvPath"/></animateMotion>
  </circle>

  <!-- executes_process edge -->
  <line x1="340" y1="295" x2="620" y2="295" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="396" y="274" width="128" height="20" rx="6" fill="#F1F5F9" stroke="#475569" stroke-width="1"/>
  <text x="460" y="288" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569" font-family="ui-monospace, Menlo, monospace">executes_process</text>

  <!-- accesses_field edge -->
  <line x1="340" y1="383" x2="620" y2="383" stroke="#0D9488" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="402" y="362" width="116" height="20" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1"/>
  <text x="460" y="376" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0D9488" font-family="ui-monospace, Menlo, monospace">accesses_field</text>

  <!-- query connector from audit box to the reads_env source -->
  <path d="M182,138 L200,168 L210,178" stroke="#E11D48" stroke-width="1.6" fill="none" stroke-dasharray="3 4"/>

  <!-- legend -->
  <text x="32" y="450" font-size="11" fill="#64748B">Each edge is traversable in walk_graph / nav / graph_query &#8212; no source read, no external tool.</text>
</svg>
