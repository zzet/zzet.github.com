<svg viewBox="0 0 920 460" width="100%" preserveAspectRatio="xMidYMid meet"
     role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Safe-edit pipeline over MCP</title>
  <desc>An edit flows through a dry-run, a unified-diff preview the agent can inspect, the actual apply, and a post-edit syntax-health check plus an external linter bridge; if the check fails the edit is flagged.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E11D48"/>
    </marker>
    <marker id="arrowEm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="459" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1E293B">A reviewable edit, not a blind write</text>
  <text x="32" y="66" font-size="12" fill="#64748B">See the diff before it lands; catch a broken edit the moment it does.</text>

  <!-- stage row -->
  <!-- 1 dry_run -->
  <g filter="url(#soft)">
    <rect x="40" y="150" width="158" height="76" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="119" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">dry_run</text>
    <text x="119" y="202" text-anchor="middle" font-size="11" fill="#64748B">compute, do not write</text>
  </g>

  <!-- 2 unified-diff preview -->
  <g filter="url(#soft)">
    <rect x="248" y="150" width="178" height="76" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
    <text x="337" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">unified-diff preview</text>
    <text x="337" y="198" text-anchor="middle" font-size="11" fill="#64748B">agent inspects the change</text>
    <text x="337" y="214" text-anchor="middle" font-size="10" fill="#0D9488" font-family="ui-monospace, Menlo, monospace">+ / − hunks</text>
  </g>

  <!-- 3 apply -->
  <g filter="url(#soft)">
    <rect x="476" y="150" width="150" height="76" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="551" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">apply</text>
    <text x="551" y="202" text-anchor="middle" font-size="11" fill="#64748B">edit lands on disk</text>
  </g>

  <!-- 4 post-edit check -->
  <g filter="url(#soft)">
    <rect x="676" y="150" width="204" height="76" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="778" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">syntax-health + lint_file</text>
    <text x="778" y="198" text-anchor="middle" font-size="11" fill="#64748B">parse check + external linter</text>
    <text x="778" y="214" text-anchor="middle" font-size="10" fill="#D97706">runs immediately after apply</text>
  </g>

  <!-- animated flowing connectors -->
  <path id="p1" d="M198,188 L248,188" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path id="p2" d="M426,188 L476,188" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path id="p3" d="M626,188 L676,188" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-dasharray="6 8" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="14" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <!-- traveling token across the whole pipeline -->
  <path id="pipeline" d="M119,188 L337,188 L551,188 L778,188" fill="none" stroke="none"/>
  <circle r="5" fill="#D97706">
    <animateMotion dur="3.4s" repeatCount="indefinite"><mpath href="#pipeline"/></animateMotion>
  </circle>

  <!-- outcomes from the post-edit check -->
  <!-- pass -->
  <g filter="url(#soft)">
    <rect x="676" y="298" width="204" height="48" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="778" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">clean</text>
    <text x="778" y="337" text-anchor="middle" font-size="10" fill="#64748B">parses + lints — edit stands</text>
  </g>
  <path d="M778,226 L778,298" stroke="#059669" stroke-width="2.2" fill="none" marker-end="url(#arrowEm)"/>

  <!-- fail -->
  <g filter="url(#soft)">
    <rect x="676" y="362" width="204" height="62" rx="10" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
    <text x="778" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#E11D48">broken</text>
    <text x="778" y="401" text-anchor="middle" font-size="10" fill="#64748B">syntax error / lint failure</text>
    <text x="778" y="416" text-anchor="middle" font-size="10" fill="#64748B">surfaced at once — not 5 edits later</text>
  </g>
  <path d="M676,326 C600,326 600,393 676,393" stroke="#E11D48" stroke-width="2.2" fill="none" marker-end="url(#arrowRose)"/>

  <!-- batch_edit callout -->
  <rect x="40" y="298" width="586" height="126" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="60" y="324" font-size="13" font-weight="700" fill="#4F46E5">batch_edit — one call, heterogeneous ops</text>
  <text x="60" y="346" font-size="11" fill="#64748B">A discriminated-union schema composes different operation kinds in a single request:</text>
  <rect x="60" y="358" width="150" height="26" rx="7" fill="#EEF2FF" stroke="#4F46E5"/>
  <text x="135" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">edit_symbol</text>
  <rect x="222" y="358" width="150" height="26" rx="7" fill="#F0FDFA" stroke="#0D9488"/>
  <text x="297" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">rename_symbol</text>
  <rect x="384" y="358" width="130" height="26" rx="7" fill="#FFFBEB" stroke="#D97706"/>
  <text x="449" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B" font-family="ui-monospace, Menlo, monospace">edit_file</text>
  <text x="60" y="406" font-size="10" fill="#64748B">…applied in dependency order, each carrying the same dry-run / preview discipline.</text>
</svg>
